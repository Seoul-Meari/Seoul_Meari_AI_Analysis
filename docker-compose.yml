services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: seoul-meari-ai-analysis:dev
    container_name: meari-api
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app        # 코드 변경 -> 즉시 반영(--reload)
      - ./requirements.txt:/app/requirements.txt
      - ~/.aws:/root/.aws:ro  # AWS 자격 증명 마운트 (읽기 전용)
    env_file:
      - .env
    environment:
      - AWS_SDK_LOAD_CONFIG=1
    restart: unless-stopped